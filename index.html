        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // --- CARGAR POLÍGONOS (ADMIN) ---
        async function cargarCierresProgramados() {
            poligonosCapa.clearLayers();
            const ahora = new Date().toISOString();
            
            // Ajuste de columnas para evitar Error 400
            const { data, error } = await sb.from('eventos_programados')
                .select('*')
                .eq('activo', true) // Si falla aquí, cambiar a 'is_active'
                .lte('inicio', ahora) // Si falla aquí, cambiar a 'start_time'
                .gte('fin', ahora);   // Si falla aquí, cambiar a 'end_time'

            if (data) {
                data.forEach(ev => {
                    const coords = ev.geometria.map(p => [p.lat, p.lng]);
                    L.polygon(coords, { color: '#ef4444', fillOpacity: 0.2, weight: 2 }).addTo(poligonosCapa);
                    const centro = L.polygon(coords).getBounds().getCenter();
                    L.marker(centro, { icon: L.divIcon({ className: 'etiqueta-evento', html: `<div class="etiqueta-caja">🚧 ${ev.nombre}</div>` })}).addTo(poligonosCapa);
                });
            }
        }

        async function enviarReporte(tipo) {
    console.log("1. Botón presionado para:", tipo);
    
    if (!navigator.geolocation) {
        alert("Tu navegador no soporta GPS o no estás en una conexión segura (HTTPS).");
        return;
    }

    console.log("2. Solicitando ubicación...");
    
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude: lat, longitude: lng } = pos.coords;
        console.log("3. Ubicación obtenida:", lat, lng);

        try {
            const hace45 = new Date(Date.now() - 45 * 60000).toISOString();
            
            // Verificación de reporte cercano
            const { data: ext, error: errBusqueda } = await sb.from('reportes')
                .select('*')
                .eq('tipo', tipo)
                .gte('created_at', hace45);

            if (errBusqueda) throw errBusqueda;

            const radio = tipo === 'calenda' ? 250 : 120;
            const cercano = ext?.find(r => calcularDistancia(lat, lng, r.lat, r.lng) < radio);

            if (cercano) {
                console.log("4. Actualizando reporte existente...");
                const { error: errUpd } = await sb.from('reportes')
                    .update({ confirmaciones: (cercano.confirmaciones || 0) + 1 })
                    .eq('id', cercano.id);
                if (errUpd) throw errUpd;
            } else {
                console.log("4. Insertando nuevo reporte...");
                const { error: errIns } = await sb.from('reportes')
                    .insert([{ lat, lng, tipo, confirmaciones: 1, created_at: new Date().toISOString() }]);
                if (errIns) throw errIns;
            }

            alert("¡Reporte enviado con éxito!");
            cerrarModal();
            map.flyTo([lat, lng], 17);
            cargarReportes();

        } catch (error) {
            console.error("Error en Supabase:", error);
            alert("Error de Base de Datos: " + error.message);
        }
    }, (err) => {
        console.error("Error de GPS:", err);
        alert("Error de GPS: " + err.message + ". Verifica que el GPS esté encendido y tengas permisos.");
    }, { 
        enableHighAccuracy: true, 
        timeout: 10000, 
        maximumAge: 0 
    });
}

        async function votar(id, val) {
            const { data } = await sb.from('reportes').select('confirmaciones').eq('id', id).single();
            await sb.from('reportes').update({ confirmaciones: (data.confirmaciones || 0) + val }).eq('id', id);
            cargarReportes();
        }

        async function marcarTerminado(id) {
            if(confirm("¿Paso libre?")) {
                await sb.from('reportes').delete().eq('id', id);
                cargarReportes();
            }
        }
